# ---------------------------------------------------------------------------
# Payee-based rules (applied to ALL transactions, not just receipt-matched ones)
# Checked AFTER user overrides (category_overrides.yaml) but BEFORE item keywords.
# ---------------------------------------------------------------------------

payee_rules:
  # Subscriptions
  - patterns: [netflix, spotify, hulu, disney, youtube, "apple one", siriusxm,
               peacock, paramount, audible, grammarly, backblaze, oura, macrofactor,
               "1password", evernote, sunsama, ynab, vivint, "burn boot camp"]
    category_id: "854f0f4c-de7e-4584-9de8-ac7b7ccfc2c3"  # Subscriptions > Misc

  # Utilities (map all to Internet bucket — most common; override for electric/gas/water if needed)
  - patterns: [xfinity, comcast, spectrum, "at&t", verizon, t-mobile,
               "dominion energy", "duke energy", "con edison", "pge", "pg&e"]
    category_id: "5407f7b8-a9be-4a3b-ac30-f29011b58b24"  # Utilities > Internet

  # Insurance
  - patterns: [geico, progressive, "state farm", allstate, safeco, nationwide,
               "liberty mutual", travelers]
    category_id: "9e692358-e411-4a03-a2bd-b380a2a83b36"  # Insurance > Car Insurance

  # Groceries (standalone grocery stores — not big-box that sell everything)
  - patterns: ["whole foods", kroger, safeway, "trader joe", aldi, publix, "h-e-b",
               "food lion", wegmans, sprouts, "fresh market", "giant eagle"]
    category_id: "0856160f-6845-46c5-bec6-df51bc9ea61f"  # GROCERIES > Groceries

  # Gas / fuel
  - patterns: [chevron, shell, exxon, speedway, "circle k", "quik trip", quiktrip,
               sunoco, wawa, sheetz, "bp ", "bpus", marathon]
    category_id: "3c8e117f-11ca-4202-9d4a-fc83f40a0913"  # TRANSPORTATION > Fuel for Ford

  # Dining out / food delivery / coffee
  - patterns: [doordash, "uber eats", grubhub, instacart, starbucks, chipotle,
               "chick-fil-a", chickfila, mcdonald, wendy, "taco bell", panera, subway,
               "olive garden", applebee, "panda express", "five guys", popeyes,
               "pizza hut", domino, "papa john", dunkin, "dutch bros"]
    category_id: "b013b72e-a3a1-4c73-8f4a-420633c9b5dd"  # Fun & Entertainment > Eating Out

  # Rideshare (uber alone = rideshare; "uber eats" already caught above)
  - patterns: [lyft]
    category_id: "e84ad554-09a0-4fa5-ad9a-e1670be412bd"  # TRANSPORTATION > Uber

  # Pharmacy / drugstore
  - patterns: [walgreens, "cvs", "rite aid", "rite-aid"]
    category_id: "6308a24b-7146-4700-8b02-04da32cbf34d"  # Health & Medical > Prescriptions

  # Big-box stores (default to Groceries — most common purchase type)
  # Override specific payees in category_overrides.yaml if needed
  - patterns: [walmart, costco, target]
    category_id: "0856160f-6845-46c5-bec6-df51bc9ea61f"  # GROCERIES > Groceries

  # Gifts & celebrations (Amazon gift orders, card shops)
  - patterns: ["hallmark", "1-800-flowers", "teleflora", "ftd flowers"]
    category_id: "b747d7df-11ef-4643-ad5d-77261891de41"  # Gifts & Celebrations > Gifts

  # Home improvement
  - patterns: ["home depot", "lowe's", lowes, menards, "ace hardware", "true value"]
    category_id: "2b52c8b4-9a9e-4326-b842-79eec08a0a23"  # NEEDS > Home Maintenance

  # Kids activities
  - patterns: ["dance studio", gymnastics, "soccer club", "little league"]
    category_id: "d807a084-14c9-428a-838a-e4c8eb434629"  # KIDS > Dance
