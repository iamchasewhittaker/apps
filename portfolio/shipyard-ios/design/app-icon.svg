<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Shipyard app icon: ship's helm on navy, per DESIGN-HANDOFF.md -->
  <!-- Navy background (iOS applies the rounded-corner mask) -->
  <rect width="1024" height="1024" fill="#07101E"/>

  <!-- Ambient compass ring (ghost) -->
  <circle cx="512" cy="512" r="440" fill="none" stroke="#0D1A34" stroke-width="2"/>
  <circle cx="512" cy="512" r="380" fill="none" stroke="#141A4C" stroke-width="2"/>

  <!-- Helm wheel -->
  <g stroke="#F2EEE6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer rim -->
    <circle cx="512" cy="512" r="288" stroke-width="34"/>

    <!-- 8 spokes -->
    <g stroke-width="30">
      <line x1="512" y1="220" x2="512" y2="804"/>
      <line x1="220" y1="512" x2="804" y2="512"/>
      <line x1="305" y1="305" x2="719" y2="719"/>
      <line x1="305" y1="719" x2="719" y2="305"/>
    </g>

    <!-- 4 handles (protruding beyond rim) -->
    <g stroke-width="30">
      <line x1="512" y1="170" x2="512" y2="252"/>
      <line x1="512" y1="772" x2="512" y2="854"/>
      <line x1="170" y1="512" x2="252" y2="512"/>
      <line x1="772" y1="512" x2="854" y2="512"/>
    </g>
  </g>

  <!-- Hub -->
  <circle cx="512" cy="512" r="58" fill="none" stroke="#F2EEE6" stroke-width="22"/>
  <circle cx="512" cy="512" r="10" fill="#F2EEE6"/>

  <!-- 4 cardinal bearing dots (steel) -->
  <circle cx="512" cy="296" r="22" fill="#4A90DE"/>
  <circle cx="512" cy="728" r="22" fill="#4A90DE"/>
  <circle cx="296" cy="512" r="22" fill="#4A90DE"/>
  <circle cx="728" cy="512" r="22" fill="#4A90DE"/>
</svg>
