<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #202124;
      background: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      background: linear-gradient(135deg, #1a73e8 0%, #4285f4 100%);
      color: white;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 500;
    }

    .header .version {
      font-size: 11px;
      opacity: 0.8;
    }

    .section {
      padding: 16px;
      border-bottom: 1px solid #e8eaed;
    }

    .section:last-child {
      border-bottom: none;
    }

    .section-title {
      font-size: 12px;
      font-weight: 500;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      cursor: pointer;
      font-size: 13px;
      color: #3c4043;
    }

    label:hover { color: #202124; }

    input[type="checkbox"] {
      accent-color: #1a73e8;
      width: 16px;
      height: 16px;
    }

    .api-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font-size: 13px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.15s;
    }

    .api-input:focus {
      border-color: #1a73e8;
    }

    .api-hint {
      font-size: 11px;
      color: #80868b;
      margin-top: 6px;
    }

    .save-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border: none;
      border-radius: 6px;
      background: #1a73e8;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .save-btn:hover { background: #1557b0; }

    .status {
      text-align: center;
      padding: 8px;
      font-size: 12px;
      color: #188038;
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Gmail Forge</h1>
      <div class="version">v1.0.0</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Classifier Mode</div>
    <select class="api-input" id="classifierMode">
      <option value="GEMINI">Gemini (AI classification)</option>
      <option value="RULES_ONLY">Rules only (no AI calls)</option>
    </select>
    <div class="api-hint">Use Rules only as a fallback route when you want zero AI/API usage.</div>
  </div>

  <div class="section">
    <div class="section-title">Gemini API Key</div>
    <input type="password" class="api-input" id="geminiApiKey" placeholder="AIza...">
    <div class="api-hint">Required only in Gemini mode. Stored locally in Chrome.</div>
  </div>

  <div class="section">
    <div class="section-title">Visible Tabs</div>
    <div id="tabList"></div>
  </div>

  <div class="section">
    <button class="save-btn" id="saveBtn">Save Settings</button>
    <div class="status" id="status">Settings saved</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
